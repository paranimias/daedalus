name: Build and Deploy Jekyll

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest # Esto le dice al runner que use Docker
    container:
      image: jekyll/builder:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and Build
        run: |
          # El contenedor ya tiene gcc, make y ruby listo
          bundle install
          bundle exec jekyll build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-files
          path: _site/

  deploy:
    needs: build
    runs-on: native # Esta etiqueta debe coincidir con la del host en nix
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: site-files
          path: ./dist

      - name: Copy to Web Folder
        run: |
          # Aquí el comando cp funcionará porque este paso corre en tu NixOS, no en Docker
          cp -r ./dist/* /var/www/blog/
          echo "Despliegue completado en /var/www/blog/"
