name: Deploy Blog

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: native
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install gems
        run: |
          /run/current-system/sw/bin/bundle config set --local path 'vendor/bundle'
          /run/current-system/sw/bin/bundle install

      - name: Build
        run: /run/current-system/sw/bin/bundle exec jekyll build --destination /tmp/blog-${{ github.run_id }}

      - name: Deploy
        run: |
          /run/current-system/sw/bin/rsync -a --delete /tmp/blog-${{ github.run_id }}/ /var/www/blog/
          rm -rf /tmp/blog-${{ github.run_id }}
