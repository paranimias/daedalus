name: Deploy Blog

on:
  push:
    branches:
      - master  # o master, el que uses

jobs:
  build-and-deploy:
    runs-on: native  # <-- CLAVE: corre directo en el host, no en Docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Jekyll
        run: |
          bundle config set --local path 'vendor/bundle'
          bundle install
          bundle exec jekyll build --destination /tmp/blog-build-$$

      - name: Deploy to /var/www/blog
        run: |
          # Reemplaza el contenido atómicamente
          rsync -a --delete /tmp/blog-build-$$/ /var/www/blog/
          rm -rf /tmp/blog-build-$$
          # Asegura permisos correctos
          chmod -R 755 /var/www/blog
