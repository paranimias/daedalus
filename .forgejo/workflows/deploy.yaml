name: Build and Deploy Jekyll
on: [push]
jobs:
  build:
    runs-on: native
    steps:
      - uses: actions/checkout@v3
      - name: Build
        run: |
          bundle install
          bundle exec jekyll build
      - name: Deploy
        run: |
          rm -rf /var/www/blog/*
          cp -R _site/* /var/www/blog
