name: Build and Deploy Jekyll

on:
  push:
    branches: [ master ]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest # Esto le dice al runner que use Docker
    container:
      image: jekyll/builder:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and Copy
        run: |
          chmod -R 777 .

          bundle install

          rm -rf /var/www/blog/*

          bundle exec jekyll build -d /var/www/blog
