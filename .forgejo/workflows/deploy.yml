name: Publicar Blog Jekyll

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    container:
      image: paranimias/mi-blog-builder:latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v3
      
      - name: Construir sitio Jekyll
        run: |
          cd /site || cd ${{ github.workspace }}
          bundle exec jekyll build --destination _site
      
      - name: Sincronizar a directorio de producción
        run: |
          cp -r _site/* /var/www/blog/
      
      - name: Verificar construcción
        run: |
          echo "✓ Blog construido exitosamente"
          ls -la _site/
